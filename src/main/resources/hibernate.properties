# Oracle JDBC connection URL used by Hibernate/UCP to connect to Oracle Database.
hibernate.connection.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1

# Oracle Database username.
# Set DB_USERNAME in the environment or replace it below
hibernate.connection.username=

# Oracle Database password.
# Set DB_PASSWORD in the environment or replace it below
hibernate.connection.password=

# Oracle JDBC driver class.
hibernate.connection.driver_class=oracle.jdbc.OracleDriver

# Oracle dialect used by Hibernate.
# Hibernate may auto-detect this, but keeping it is acceptable.
# hibernate.dialect=org.hibernate.dialect.OracleDialect

# Print generated SQL statements.
hibernate.show_sql=false

# Automatically update the database schema from entity mappings.
hibernate.hbm2ddl.auto=update


# Oracle Universal Connection Pool connection factory class.
hibernate.oracleucp.connectionFactoryClassName=oracle.jdbc.datasource.impl.OracleDataSource

# Number of connections created when the pool starts.
hibernate.oracleucp.initialPoolSize=3

# Minimum number of connections kept in the pool.
hibernate.oracleucp.minPoolSize=3

# Maximum number of connections allowed in the pool.
hibernate.oracleucp.maxPoolSize=5

# Logical name of the UCP connection pool.
hibernate.oracleucp.connectionPoolName=hibernateVectorPool

# Logical name of the UCP data source.
hibernate.oracleucp.dataSourceName=hibernateVectorDataSource

# Additional JDBC connection properties passed to Oracle connections.
hibernate.oracleucp.connectionProperties={autoCommit=false}

# Enable Fast Connection Failover; keep false unless using RAC/FAN/ONS.
hibernate.oracleucp.fastConnectionFailoverEnabled=false

# Validate a connection before borrowing it from the pool.
hibernate.oracleucp.validateConnectionOnBorrow=true

# Seconds to trust an idle connection after validation.
hibernate.oracleucp.secondsToTrustIdleConnection=120

# Seconds before an inactive connection can be removed.
hibernate.oracleucp.inactiveConnectionTimeout=180

# Maximum prepared statements cached per connection.
hibernate.oracleucp.maxStatements=20

# Maximum seconds to wait for a connection when the pool is exhausted.
hibernate.oracleucp.connectionWaitTimeout=30
